<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Restore the path that 404.html encoded into the query string.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(
            null, null,
            l.pathname.slice(0, -1) + decoded[0] +
            (decoded[1] ? '?' + decoded[1] : '') +
            l.hash
          );
        }
      }(window.location));
    </script>
    <link rel="icon" type="image/png" href="/public/images/cat_no_bg.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>米赫瑪超吉情豹站 | Mecharashi-Milhama PawInfo Station</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
